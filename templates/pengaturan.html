<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan – SPK Pertanian Seattle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --bg:       #0d1117;
            --surface:  #161b22;
            --surface2: #1c2333;
            --border:   rgba(255,255,255,0.07);
            --text:     #e6edf3;
            --muted:    #7d8590;
            --accent:   #3fb950;
            --accent2:  #58a6ff;
            --warn:     #d29922;
            --danger:   #f85149;
            --rain:     #1f6feb;
            --radius:   14px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
        }

        nav {
            position: sticky; top: 0; z-index: 50;
            background: rgba(13,17,23,0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; height: 56px;
        }

        .nav-brand { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .nav-brand i { color: var(--accent2); }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-user { font-size: 13px; color: var(--muted); }
        .btn-logout {
            font-size: 13px; font-family: 'DM Sans', sans-serif;
            background: transparent; color: var(--danger);
            border: 1px solid rgba(248,81,73,0.3);
            border-radius: 8px; padding: 6px 14px; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            transition: background 0.2s; text-decoration: none;
        }
        .btn-logout:hover { background: rgba(248,81,73,0.1); }

        .page { display: grid; grid-template-columns: 180px 1fr; min-height: calc(100vh - 56px); }
        .sidenav {
            border-right: 1px solid var(--border);
            padding: 1.5rem 0;
            display: flex; flex-direction: column; gap: 2px;
            background: rgba(22,34,26,0.5);
        }
        .nav-section-label {
            font-size: 10px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.1em;
            padding: 0 1rem; margin: 1rem 0 4px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 1rem; font-size: 13px; color: var(--muted);
            border-radius: 8px; margin: 0 8px;
            cursor: pointer; text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }
        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .nav-item.active {
            background: rgba(63,185,80,0.1);
            color: var(--accent);
            border: 1px solid rgba(63,185,80,0.2);
        }
        .nav-item i { width: 14px; text-align: center; font-size: 12px; }

        .content { padding: 1.75rem 2rem 4rem; overflow: auto; }
        .page-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem; color: var(--text); margin-bottom: 1.5rem;
        }

        /* TABS */
        .tab-nav {
            display: flex; gap: 0; margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            padding: 10px 20px; font-size: 13px; font-family: 'DM Sans', sans-serif;
            background: transparent; color: var(--muted); border: none;
            cursor: pointer; border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-btn:hover { color: var(--text); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem; margin-bottom: 12px;
        }
        .card-title {
            font-size: 11px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.08em;
            margin-bottom: 1rem;
        }
        .form-group { margin-bottom: 12px; }
        .form-label {
            font-size: 12px; color: var(--muted);
            display: block; margin-bottom: 4px;
        }
        .form-input {
            width: 100%; padding: 8px 12px;
            background: var(--surface2); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 14px; font-family: 'DM Sans', sans-serif;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        
        .checkbox-group {
            display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;
        }
        .checkbox-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--text);
            padding: 4px 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px; cursor: pointer;
            transition: all 0.2s;
        }
        .checkbox-item input[type="checkbox"] { accent-color: var(--accent); }
        .checkbox-item:has(input:checked) {
            border-color: var(--accent);
            background: rgba(63,185,80,0.1);
        }

        .btn-primary {
            background: var(--accent); color: #0d1117;
            border: none; border-radius: 8px;
            padding: 10px 20px; font-size: 14px; font-weight: 500;
            font-family: 'DM Sans', sans-serif; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.85; }
        .btn-danger {
            background: transparent; color: var(--danger);
            border: 1px solid rgba(248,81,73,0.3);
            border-radius: 8px; padding: 8px 16px;
            font-size: 13px; font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-danger:hover { background: rgba(248,81,73,0.1); }

        .tanaman-list-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .tanaman-list-item:last-child { border-bottom: none; }
        .tanaman-list-info { flex: 1; }
        .tanaman-list-info .tl-name { color: var(--text); font-weight: 500; }
        .tanaman-list-info .tl-detail { color: var(--muted); font-size: 11px; margin-top: 2px; }

        .alert-msg {
            padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 12px; display: none;
        }
        .alert-msg.success { background: rgba(63,185,80,0.1); color: var(--accent); border: 1px solid rgba(63,185,80,0.2); }
        .alert-msg.error   { background: rgba(248,81,73,0.1);  color: var(--danger); border: 1px solid rgba(248,81,73,0.2); }

        .slider-group { margin-bottom: 16px; }
        .slider-label-row {
            display: flex; justify-content: space-between;
            font-size: 12px; margin-bottom: 4px;
        }
        .slider-label-row .sl-val { color: var(--accent); font-weight: 500; }
        input[type="range"] {
            width: 100%; accent-color: var(--accent);
        }
        .total-bobot {
            font-size: 24px; font-family: 'DM Serif Display', serif;
            text-align: center; padding: 12px;
            border-radius: 8px; margin-bottom: 12px;
        }
        .total-bobot.ok  { color: var(--accent); background: rgba(63,185,80,0.08); }
        .total-bobot.err { color: var(--danger);  background: rgba(248,81,73,0.08); }
        .ticker { overflow: hidden; white-space: nowrap; background: var(--bg); border-bottom: 1px solid var(--bg); padding: 8px 0; }
        .ticker-inner { display: inline-block; padding-left: 100%; animation: ticker 20s linear infinite; font-size: 12px; color: var(--text); }
        .ticker-inner .label { margin-right: 6px; }
        .ticker-inner .value { margin-right: 18px; }
        @keyframes ticker { to { transform: translateX(-100%); } }
        .lang-switch { display: flex; gap: 4px; margin-left: 8px; display: none;}
        .lang-btn { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; text-decoration: none; }
        .lang-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }
    </style>
</head>
<body>

<!-- TICKER -->
<div class="ticker">
    <div class="ticker-inner" id="tickerText">
        <span>Selamat Datang di AgriSmart System</span>
    </div>
</div>


<nav>
    <div class="nav-brand">
        <i class="fas fa-cloud-sun-rain"></i>
        Seattle City, USA
    </div>
    <div class="nav-right">
        <div class="lang-switch">
            <a href="{{ url_for('set_language', lang_code='id') }}" class="lang-btn {% if session.get('lang','id')=='id' %}active{% else %}inactive{% endif %}">ID</a>
            <a href="{{ url_for('set_language', lang_code='en') }}" class="lang-btn {% if session.get('lang','id')=='en' %}active{% else %}inactive{% endif %}">EN</a>
        </div>
        <span class="nav-user">{{ username }}</span>
        <a href="{{ url_for('logout') }}" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> {{ lang.logout }}
        </a>
    </div>
</nav>

<div class="page">
    <div class="sidenav">
        <div class="nav-section-label">Menu</div>
        <a class="nav-item" href="{{ url_for('user_dashboard') }}">
            <i class="fas fa-home"></i> Dashboard
        </a>
        <a class="nav-item" href="{{ url_for('laporan_page') }}">
            <i class="fas fa-chart-line"></i> Laporan 30 Hari
        </a>
        <a class="nav-item active" href="{{ url_for('pengaturan_page') }}">
            <i class="fas fa-cog"></i> Pengaturan
        </a>
    </div>

    <div class="content">
        <div class="page-title">Pengaturan</div>

        <!-- Alert -->
        <div class="alert-msg" id="alertMsg"></div>

        <!-- TABS -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('tanaman')">🌱 Kelola Tanaman</button>
            <button class="tab-btn" onclick="switchTab('bobot')">⚖️ Ubah Bobot</button>
        </div>

        <!-- TAB: TANAMAN -->
        <div class="tab-content active" id="tabTanaman">
            <div class="card">
                <div class="card-title"><i class="fas fa-plus-circle"></i> Tambah Tanaman Baru</div>
                <div class="form-group">
                    <label class="form-label">Nama Tanaman</label>
                    <input type="text" class="form-input" id="namaTanaman" placeholder="Contoh: Selada">
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
                    <div class="form-group">
                        <label class="form-label">Curah Hujan Ideal (mm/hari)</label>
                        <input type="number" class="form-input" id="precipTanaman" value="5" step="0.1" min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Suhu Maks Ideal (°C)</label>
                        <input type="number" class="form-input" id="tempTanaman" value="25" step="0.1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Angin Maks (m/s)</label>
                        <input type="number" class="form-input" id="windTanaman" value="3" step="0.1" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Cuaca yang Cocok</label>
                    <div class="checkbox-group" id="cuacaCheckbox">
                        <label class="checkbox-item"><input type="checkbox" value="sun" checked>☀️ Cerah</label>
                        <label class="checkbox-item"><input type="checkbox" value="fog">🌫️ Berkabut</label>
                        <label class="checkbox-item"><input type="checkbox" value="drizzle">🌦️ Gerimis</label>
                        <label class="checkbox-item"><input type="checkbox" value="rain">🌧️ Hujan</label>
                        <label class="checkbox-item"><input type="checkbox" value="snow">❄️ Salju</label>
                    </div>
                </div>
                <button class="btn-primary" onclick="tambahTanaman()">
                    <i class="fas fa-plus"></i> Tambah Tanaman
                </button>
            </div>

            <div class="card">
                <div class="card-title"><i class="fas fa-list"></i> Daftar Tanaman</div>
                <div id="daftarTanaman"></div>
            </div>
        </div>

        <!-- TAB: BOBOT -->
        <div class="tab-content" id="tabBobot">
            <div class="card">
                <div class="card-title"><i class="fas fa-sliders-h"></i> Bobot Kriteria SAW</div>
                <div class="total-bobot ok" id="totalBobot">Total: 1.00</div>
                <div id="sliderContainer"></div>

                <div class="card-title" style="margin-top:1.5rem">
                    <i class="fas fa-ruler"></i> Batas Normalisasi Maksimum
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
                    <div class="form-group">
                        <label class="form-label">Max Precipitation (mm)</label>
                        <input type="number" class="form-input" id="normPrecip" value="{{ norm_max.precipitation }}" step="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Temp (°C)</label>
                        <input type="number" class="form-input" id="normTemp" value="{{ norm_max.temp_max }}" step="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Wind (m/s)</label>
                        <input type="number" class="form-input" id="normWind" value="{{ norm_max.wind }}" step="1">
                    </div>
                </div>

                <button class="btn-primary" onclick="simpanBobot()" style="margin-top:12px">
                    <i class="fas fa-save"></i> Simpan Bobot & Normalisasi
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==== TABS ====
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        
        if (tab === 'tanaman') loadTanaman();
        if (tab === 'bobot') loadBobot();
    }

    // ==== ALERT ====
    function showAlert(msg, type) {
        const el = document.getElementById('alertMsg');
        el.textContent = msg;
        el.className = 'alert-msg ' + type;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    // ==== TANAMAN ====
    async function loadTanaman() {
        try {
            const res = await fetch('/api/tanaman');
            const data = await res.json();
            renderTanamanList(data);
        } catch(e) {
            document.getElementById('daftarTanaman').innerHTML = '<p style="color:var(--muted);font-size:13px">Gagal memuat data</p>';
        }
    }

    function renderTanamanList(data) {
        const entries = Object.entries(data);
        if (entries.length === 0) {
            document.getElementById('daftarTanaman').innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:1rem">Belum ada tanaman</p>';
            return;
        }
        document.getElementById('daftarTanaman').innerHTML = entries.map(([nama, nilai]) => `
            <div class="tanaman-list-item">
                <div class="tanaman-list-info">
                    <div class="tl-name">🌱 ${nama}</div>
                    <div class="tl-detail">
                        Hujan: ${nilai.precipitation}mm | Suhu: ${nilai.temp_max}°C | Angin: ${nilai.wind}m/s | Cuaca: ${nilai.cuaca_cocok.join(', ')}
                    </div>
                </div>
                <button class="btn-danger" onclick="hapusTanaman('${nama}')">
                    <i class="fas fa-trash"></i> Hapus
                </button>
            </div>
        `).join('');
    }

    async function tambahTanaman() {
        const nama = document.getElementById('namaTanaman').value.trim();
        if (!nama) return showAlert('Nama tanaman harus diisi', 'error');

        const checked = [];
        document.querySelectorAll('#cuacaCheckbox input:checked').forEach(cb => checked.push(cb.value));
        if (checked.length === 0) return showAlert('Pilih minimal 1 cuaca', 'error');

        const data = {
            nama: nama,
            precipitation: parseFloat(document.getElementById('precipTanaman').value),
            temp_max: parseFloat(document.getElementById('tempTanaman').value),
            wind: parseFloat(document.getElementById('windTanaman').value),
            cuaca_cocok: checked
        };

        try {
            const res = await fetch('/api/tanaman', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.error) return showAlert(result.error, 'error');
            
            showAlert(result.message, 'success');
            document.getElementById('namaTanaman').value = '';
            loadTanaman();
        } catch(e) {
            showAlert('Gagal menambah tanaman', 'error');
        }
    }

    async function hapusTanaman(nama) {
        if (!confirm(`Hapus tanaman "${nama}"?`)) return;
        try {
            const res = await fetch('/api/tanaman', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nama: nama })
            });
            const result = await res.json();
            if (result.error) return showAlert(result.error, 'error');
            showAlert(result.message, 'success');
            loadTanaman();
        } catch(e) {
            showAlert('Gagal menghapus tanaman', 'error');
        }
    }

    // ==== BOBOT ====
    let currentBobot = {};
    let sliderValues = {};

    async function loadBobot() {
        try {
            const res = await fetch('/api/bobot');
            const data = await res.json();
            currentBobot = data.bobot;
            renderSliders(data.bobot);
            document.getElementById('normPrecip').value = data.norm_max.precipitation;
            document.getElementById('normTemp').value = data.norm_max.temp_max;
            document.getElementById('normWind').value = data.norm_max.wind;
        } catch(e) {
            console.error(e);
        }
    }

    function renderSliders(bobotData) {
        const labels = {
            precipitation: 'Curah Hujan',
            temp_max: 'Suhu Maksimum',
            wind: 'Kecepatan Angin',
            prediksi_cuaca: 'Prediksi Cuaca'
        };
        
        sliderValues = {...bobotData};
        
        document.getElementById('sliderContainer').innerHTML = Object.entries(bobotData).map(([key, val]) => `
            <div class="slider-group">
                <div class="slider-label-row">
                    <span>${labels[key] || key}</span>
                    <span class="sl-val" id="slVal_${key}">${(val*100).toFixed(0)}%</span>
                </div>
                <input type="range" min="0" max="1" step="0.01" value="${val}" 
                       data-key="${key}" oninput="updateSlider(this)">
            </div>
        `).join('');
        
        updateTotalBobot();
    }

    function updateSlider(slider) {
        const key = slider.dataset.key;
        sliderValues[key] = parseFloat(slider.value);
        document.getElementById('slVal_' + key).textContent = (slider.value * 100).toFixed(0) + '%';
        updateTotalBobot();
    }

    function updateTotalBobot() {
        const total = Object.values(sliderValues).reduce((a, b) => a + b, 0);
        const el = document.getElementById('totalBobot');
        el.textContent = 'Total: ' + total.toFixed(2);
        el.className = 'total-bobot ' + (Math.abs(total - 1.0) < 0.001 ? 'ok' : 'err');
    }

    async function simpanBobot() {
        const total = Object.values(sliderValues).reduce((a, b) => a + b, 0);
        if (Math.abs(total - 1.0) > 0.001) {
            return showAlert('Total bobot harus 1.00 (sekarang ' + total.toFixed(2) + ')', 'error');
        }

        const data = {
            bobot: sliderValues,
            norm_max: {
                precipitation: parseFloat(document.getElementById('normPrecip').value),
                temp_max: parseFloat(document.getElementById('normTemp').value),
                wind: parseFloat(document.getElementById('normWind').value)
            }
        };

        try {
            const res = await fetch('/api/bobot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.error) return showAlert(result.error, 'error');
            showAlert(result.message, 'success');
        } catch(e) {
            showAlert('Gagal menyimpan bobot', 'error');
        }
    }

        function updateTicker(today, laporan) {
        const cuaca = cuacaLabel[today.prediksi_cuaca.toLowerCase()] || today.prediksi_cuaca;
        const top1  = laporan.ranking_tanaman?.[0]?.tanaman || '—';
        document.getElementById('tickerText').innerHTML =
            '• <span class="label">' + langData.cuaca_hari_ini + '</span> <span class="value">' + cuaca + '</span> • ' +
            '<span class="label">' + langData.suhu_maks + '</span> <span class="value">' + today.temp_max.toFixed(1) + '°C</span> • ' +
            '<span class="label">' + langData.curah_hujan + '</span> <span class="value">' + today.precipitation.toFixed(1) + ' mm</span> • ' +
            '<span class="label">' + langData.angin + '</span> <span class="value">' + today.wind.toFixed(1) + ' m/s</span> • ' +
            '<span class="label">' + langData.tanaman + ' Terbaik</span> <span class="value">' + top1 + '</span>';
    }

    // Load awal
    loadTanaman();
</script>
</body>
</html>
